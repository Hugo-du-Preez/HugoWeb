<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0078D4"/>
      <stop offset="1" stop-color="#40E0D0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(120,110)">
    <rect x="0" y="0" width="1360" height="680" rx="22" fill="#ffffff" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="1360" height="90" rx="22" fill="url(#accent)"/>
    <text x="44" y="58" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800" fill="#ffffff">
      Architecture Diagram Placeholder
    </text>

    <g transform="translate(60,170)" font-family="Inter,Segoe UI,Arial,sans-serif">
      <text x="0" y="0" font-size="22" font-weight="700" fill="#0F172A">Drop in your PNG/SVG diagram here</text>
      <text x="0" y="40" font-size="16" font-weight="500" fill="#475569">
        Tip: export from draw.io / Lucidchart at 1600×900 for best quality.
      </text>
    </g>

    <g transform="translate(80,280)" stroke="#CBD5E1" stroke-width="3" fill="none">
      <rect x="0" y="0" width="1180" height="410" rx="18" stroke-dasharray="10 10"/>
      <path d="M0,0 L1180,410"/>
